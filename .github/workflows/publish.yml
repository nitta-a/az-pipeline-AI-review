name: Publish to VS Marketplace

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'バージョン番号 (例: 1.2.3)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      # タグ push と手動実行の両方でバージョンを解決する
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # "v1.2.3" → "1.2.3"
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      # タグ push と手順内で解決したバージョンを環境変数へ設定
      - name: Set version envs
        id: set_version_envs
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "MAJOR=$MAJOR" >> $GITHUB_ENV
          echo "MINOR=$MINOR" >> $GITHUB_ENV
          echo "PATCH=$PATCH" >> $GITHUB_ENV

      - name: Update vss-extension.json
        run: |
          node -e "
            const fs = require('fs');
            const f = 'vss-extension.json';
            const j = JSON.parse(fs.readFileSync(f, 'utf8'));
            j.version = process.env.VERSION;
            fs.writeFileSync(f, JSON.stringify(j, null, 4));
            console.log('vss-extension.json version:', j.version);
          "

      - name: Update task.json
        run: |
          node -e "
            const fs = require('fs');
            const f = 'task.json';
            const j = JSON.parse(fs.readFileSync(f, 'utf8'));
            j.version = {
              Major: parseInt(process.env.MAJOR),
              Minor: parseInt(process.env.MINOR),
              Patch: parseInt(process.env.PATCH)
            };
            fs.writeFileSync(f, JSON.stringify(j, null, 2));
            console.log('task.json version:', JSON.stringify(j.version));
          "

      # dist/LLMReviewerTask/ にタスク実行に必要なファイルだけを集める
      # (node_modules は本番依存のみ)
      - name: Prepare task distribution folder
        run: |
          set -e
          mkdir -p dist/LLMReviewerTask

          # tsc が生成するファイルと task.json を配置
          cp -f task.json dist/LLMReviewerTask/ || true

          # バンドルして依存を単一ファイルにまとめる（node_modules を含めない）
          npm run bundle

          # tfx はルート直下の LLMReviewerTask を参照することがあるため、コピーしておく
          rm -rf LLMReviewerTask || true
          cp -r dist/LLMReviewerTask ./LLMReviewerTask

      - name: Verify assets
        run: |
          if [ ! -f "overview.md" ]; then
            echo "Error: overview.md not found in root directory."
            # 必要であればここでデフォルトの md を生成するか、エラー終了させる
            exit 1
          fi
          ls -l overview.md vss-extension.json

      - name: Ensure icon is 128x128
        run: |
          set -e
          ICON=extension-icon.png
          if [ -f "$ICON" ]; then
            if command -v identify >/dev/null 2>&1; then
              W=$(identify -format "%w" "$ICON")
              H=$(identify -format "%h" "$ICON")
            else
              read W H < <(node -e "const fs=require('fs');const b=fs.readFileSync(process.argv[1]);console.log(b.readUInt32BE(16),' ',b.readUInt32BE(20));" $ICON)
            fi
            if [ "$W" -lt 128 ] || [ "$H" -lt 128 ] || [ "$W" -ne "$H" ]; then
              if ! command -v convert >/dev/null 2>&1; then
                sudo apt-get update && sudo apt-get install -y imagemagick
              fi
              convert "$ICON" -resize 128x128 -background none -gravity center -extent 128x128 "$ICON"
              echo "Resized $ICON to 128x128"
            else
              echo "Icon OK: ${W}x${H}"
            fi
          else
            if ! command -v convert >/dev/null 2>&1; then
              sudo apt-get update && sudo apt-get install -y imagemagick
            fi
            convert -size 128x128 xc:'#2b6cb0' -gravity center -pointsize 36 -fill white -annotate 0 'AI' "$ICON"
            echo "Generated placeholder $ICON"
          fi

      # VS Marketplace へパブリッシュ
      # 事前に GitHub Secrets へ MARKETPLACE_TOKEN を設定しておくこと
      # (Azure DevOps → User Settings → Personal Access Tokens → Marketplace: Publish)
      - name: Publish extension to VS Marketplace
        run: |
          npx tfx-cli extension publish \
            --manifest-globs vss-extension.json \
            --token "${{ secrets.MARKETPLACE_TOKEN }}" \
            --no-prompt
