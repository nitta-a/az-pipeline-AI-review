<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2b90ff"/>
      <stop offset="1" stop-color="#6dd3ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="18" ry="18" fill="url(#g)" />

  <!-- Document shape -->
  <g transform="translate(22,18)" filter="url(#shadow)">
    <rect x="0" y="0" width="64" height="88" rx="6" fill="#ffffff" opacity="0.98"/>
    <path d="M64 12 L52 0 L52 12 Z" fill="#ffffff"/>
    <!-- lines -->
    <rect x="8" y="18" width="48" height="4" rx="2" fill="#e9f2ff"/>
    <rect x="8" y="30" width="36" height="4" rx="2" fill="#e9f2ff"/>
    <rect x="8" y="42" width="48" height="4" rx="2" fill="#e9f2ff"/>
    <rect x="8" y="54" width="36" height="4" rx="2" fill="#e9f2ff"/>
  </g>

  <!-- Checkmarks to imply review -->
  <g transform="translate(56,64)">
    <circle cx="18" cy="18" r="18" fill="#fff" opacity="0.88"/>
    <path d="M10 18 L15 23 L28 10" stroke="#1fa84b" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- AI badge -->
  <g transform="translate(74,18)">
    <circle cx="18" cy="18" r="18" fill="#0b2545"/>
    <text x="18" y="24" font-family="Segoe UI, Roboto, Arial" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">AI</text>
  </g>

  <!-- subtle outline -->
  <rect x="4" y="4" width="120" height="120" rx="18" ry="18" fill="none" stroke="#ffffff33"/>
</svg>
